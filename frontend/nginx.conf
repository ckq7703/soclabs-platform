map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $cookie_guac_user $decoded_guac_user {
    ~^(?<prefix>.*)%40(?<suffix>.*)$  "${prefix}@${suffix}";
    default                            $cookie_guac_user;
}

server {

    listen 80;
    server_name localhost;

    # Force DNS to resolve only A records (IPv4), no IPv6
    resolver 8.8.8.8 8.8.4.4 ipv6=off valid=60s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy main platform API requests to the local api-gateway
    location /api/v1 {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Lab-specific API requests to the external server
    # Using variable forces nginx to resolve DNS at runtime (with ipv6=off above → IPv4 only)
    location ~ ^/api/(auth|labs|sessions) {
        set $lab_upstream "https://lab.smartpro.com.vn";
        proxy_pass $lab_upstream;

        proxy_set_header Host lab.smartpro.com.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;
        proxy_connect_timeout 10s;
    }

    # Proxy Guacamole client requests to client.smartpro.com.vn
    # No auth_request - inject Remote-User from guac_user cookie directly (same as frontend-fix)
    location /guacamole {
        set $guac_upstream "https://client.smartpro.com.vn";
        proxy_pass $guac_upstream;

        add_header X-Debug-Guac-User $cookie_guac_user always;
        add_header X-Debug-Decoded-Guac-User $decoded_guac_user always;

        # Rewrite Set-Cookie domain/path for cross-subdomain compatibility
        proxy_cookie_domain client.smartpro.com.vn soc.smartpro.com.vn;
        proxy_cookie_path /guacamole /guacamole;

        proxy_set_header Host client.smartpro.com.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject Remote-User from guac_user cookie (Guacamole header auth)
        proxy_set_header Remote-User $decoded_guac_user;

        # Override Origin and Referer headers to bypass Tomcat CSRF/Origin checks
        proxy_set_header Origin https://client.smartpro.com.vn;
        proxy_set_header Referer https://client.smartpro.com.vn/guacamole/;

        # Disable buffering for real-time WebSocket streaming
        proxy_buffering off;

        # Guacamole WebSocket settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSL settings
        proxy_ssl_server_name on;

        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # Fallback for other /api requests
    location /api {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
